{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        max-width: 400px;
        margin: 60px auto;
        padding: 40px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .auth-container h2 {
        text-align: center;
        margin-bottom: 8px;
        color: #1a1a2e;
        font-size: 24px;
    }
    .auth-container .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 32px;
        font-size: 14px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        font-size: 13px;
        color: #333;
    }
    .form-group input {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        transition: border-color 0.2s;
        box-sizing: border-box;
    }
    .form-group input:focus {
        outline: none;
        border-color: #a50034;
        box-shadow: 0 0 0 3px rgba(165,0,52,0.1);
    }
    .btn-auth {
        width: 100%;
        padding: 12px;
        background: #a50034;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
    }
    .btn-auth:hover {
        background: #8a002b;
    }
    .btn-auth:disabled {
        background: #ccc;
        cursor: not-allowed;
    }
    .auth-footer {
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        color: #666;
    }
    .auth-footer a {
        color: #a50034;
        text-decoration: none;
        font-weight: 600;
    }
    .auth-error {
        background: #fef2f2;
        color: #dc2626;
        padding: 10px 14px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 13px;
        display: none;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <h2>Login</h2>
    <p class="subtitle">SI Sizing Tool Ver.2.0 - Shared DB</p>

    <div class="auth-error" id="loginError"></div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username" autofocus>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-auth" id="loginBtn">Login</button>
    </form>

    <div class="auth-footer">
        Don't have an account? <a href="/auth/register">Register</a>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const errDiv = document.getElementById('loginError');
    btn.disabled = true;
    errDiv.style.display = 'none';

    try {
        const resp = await fetch('/auth/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            })
        });
        const data = await resp.json();
        if (resp.ok) {
            window.location.href = '/';
        } else {
            errDiv.textContent = data.error || 'Login failed';
            errDiv.style.display = 'block';
        }
    } catch (err) {
        errDiv.textContent = 'Network error. Please try again.';
        errDiv.style.display = 'block';
    } finally {
        btn.disabled = false;
    }
    return false;
}
</script>
{% endblock %}
