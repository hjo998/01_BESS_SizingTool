{% extends "base.html" %}
{% block title %}Shared Designs{% endblock %}

{% block extra_css %}
<style>
    .shared-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    .shared-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .shared-header h2 { margin: 0; color: #1a1a2e; font-size: 22px; }
    .filters { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filters input, .filters select {
        padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;
        font-size: 13px; background: #fff;
    }
    .filters input:focus, .filters select:focus {
        outline: none; border-color: #a50034;
    }
    .btn-filter { padding: 8px 16px; background: #a50034; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-filter:hover { background: #8a002b; }
    .btn-reset { padding: 8px 16px; background: #f5f5f5; color: #333; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 13px; }

    .designs-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .designs-table th { background: #f8f9fa; padding: 12px 16px; text-align: left; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #eee; }
    .designs-table td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .designs-table tr:hover { background: #fafafa; }
    .designs-table a { color: #a50034; text-decoration: none; font-weight: 500; }
    .designs-table a:hover { text-decoration: underline; }

    .status-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .status-draft { background: #e3f2fd; color: #1565c0; }
    .status-submitted { background: #e8f5e9; color: #2e7d32; }
    .status-unlocked { background: #fff3e0; color: #e65100; }

    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 24px; }
    .pagination button { padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; }
    .pagination button.active { background: #a50034; color: #fff; border-color: #a50034; }
    .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }

    .empty-state { text-align: center; padding: 60px 20px; color: #999; }
    .empty-state h3 { color: #666; margin-bottom: 8px; }
</style>
{% endblock %}

{% block content %}
<div class="shared-container">
    <div class="shared-header">
        <h2>Shared Designs</h2>
    </div>

    <div class="filters">
        <input type="text" id="filterProject" placeholder="Search project..." style="width:200px;">
        <select id="filterStatus">
            <option value="">All Status</option>
            <option value="draft">Draft</option>
            <option value="submitted">Submitted</option>
            <option value="unlocked">Unlocked</option>
        </select>
        <select id="filterUser">
            <option value="">All Authors</option>
        </select>
        <input type="date" id="filterDateFrom" title="From date">
        <input type="date" id="filterDateTo" title="To date">
        <button class="btn-filter" onclick="loadDesigns(1)">Search</button>
        <button class="btn-reset" onclick="resetFilters()">Reset</button>
    </div>

    <table class="designs-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Project</th>
                <th>Rev</th>
                <th>Status</th>
                <th>Author</th>
                <th>Updated</th>
            </tr>
        </thead>
        <tbody id="designsBody">
            <tr><td colspan="6" class="empty-state">Loading...</td></tr>
        </tbody>
    </table>

    <div class="pagination" id="pagination"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var currentPage = 1;

document.addEventListener('DOMContentLoaded', function() {
    loadUsers();
    loadDesigns(1);
});

function loadUsers() {
    fetch('/api/shared/users')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var sel = document.getElementById('filterUser');
            (data.users || []).forEach(function(u) {
                var opt = document.createElement('option');
                opt.value = u.id;
                opt.textContent = u.display_name;
                sel.appendChild(opt);
            });
        });
}

function loadDesigns(page) {
    currentPage = page;
    var params = new URLSearchParams();
    params.set('page', page);
    params.set('per_page', '20');

    var project = document.getElementById('filterProject').value.trim();
    var status = document.getElementById('filterStatus').value;
    var userId = document.getElementById('filterUser').value;
    var dateFrom = document.getElementById('filterDateFrom').value;
    var dateTo = document.getElementById('filterDateTo').value;

    if (project) params.set('project', project);
    if (status) params.set('status', status);
    if (userId) params.set('user', userId);
    if (dateFrom) params.set('date_from', dateFrom);
    if (dateTo) params.set('date_to', dateTo);

    fetch('/api/shared/designs?' + params.toString())
        .then(function(r) { return r.json(); })
        .then(function(data) {
            renderDesigns(data);
            renderPagination(data);
        })
        .catch(function(err) {
            document.getElementById('designsBody').innerHTML =
                '<tr><td colspan="6" class="empty-state">Error loading designs</td></tr>';
        });
}

function renderDesigns(data) {
    var tbody = document.getElementById('designsBody');
    if (!data.designs || data.designs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><h3>No designs found</h3><p>Upload your first design from the Sizing Tool results page.</p></div></td></tr>';
        return;
    }

    var html = '';
    data.designs.forEach(function(d) {
        var statusClass = 'status-' + d.status;
        var statusIcon = d.status === 'draft' ? '📝' : d.status === 'submitted' ? '✅' : '🔓';
        var date = d.updated_at ? d.updated_at.substring(0, 10) : '-';
        html += '<tr>' +
            '<td>' + d.id + '</td>' +
            '<td><a href="/shared/' + d.id + '">' + escapeHtml(d.project_name) + '</a></td>' +
            '<td>R' + d.revision + '</td>' +
            '<td><span class="status-badge ' + statusClass + '">' + statusIcon + ' ' + d.status.toUpperCase() + '</span></td>' +
            '<td>' + escapeHtml(d.creator_name || '-') + '</td>' +
            '<td>' + date + '</td>' +
            '</tr>';
    });
    tbody.innerHTML = html;
}

function renderPagination(data) {
    var div = document.getElementById('pagination');
    if (data.pages <= 1) { div.innerHTML = ''; return; }

    var html = '';
    html += '<button ' + (data.page <= 1 ? 'disabled' : '') + ' onclick="loadDesigns(' + (data.page - 1) + ')">&laquo; Prev</button>';
    for (var i = 1; i <= data.pages; i++) {
        html += '<button class="' + (i === data.page ? 'active' : '') + '" onclick="loadDesigns(' + i + ')">' + i + '</button>';
    }
    html += '<button ' + (data.page >= data.pages ? 'disabled' : '') + ' onclick="loadDesigns(' + (data.page + 1) + ')">Next &raquo;</button>';
    div.innerHTML = html;
}

function resetFilters() {
    document.getElementById('filterProject').value = '';
    document.getElementById('filterStatus').value = '';
    document.getElementById('filterUser').value = '';
    document.getElementById('filterDateFrom').value = '';
    document.getElementById('filterDateTo').value = '';
    loadDesigns(1);
}

function escapeHtml(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
}
</script>
{% endblock %}
