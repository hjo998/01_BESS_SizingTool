{% extends "base.html" %}
{% block title %}Admin Audit Log{% endblock %}

{% block extra_css %}
<style>
    .audit-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    .audit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .audit-header h2 { margin: 0; color: #1a1a2e; font-size: 22px; }
    .filters { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filters input, .filters select {
        padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px;
        font-size: 13px; background: #fff;
    }
    .filters input:focus, .filters select:focus { outline: none; border-color: #a50034; }
    .btn-filter { padding: 8px 16px; background: #a50034; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .btn-filter:hover { background: #8a002b; }
    .btn-reset { padding: 8px 16px; background: #f5f5f5; color: #333; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; font-size: 13px; }

    .audit-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .audit-table th { background: #f8f9fa; padding: 12px 16px; text-align: left; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #eee; }
    .audit-table td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .audit-table tr:hover { background: #fafafa; }

    .action-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
    .action-created { background: #e3f2fd; color: #1565c0; }
    .action-updated { background: #fff3e0; color: #e65100; }
    .action-submitted { background: #e8f5e9; color: #2e7d32; }
    .action-unlocked { background: #fce4ec; color: #c62828; }
    .action-relocked { background: #e8f5e9; color: #2e7d32; }
    .action-deleted { background: #ffebee; color: #b71c1c; }
    .action-revision_created { background: #ede7f6; color: #4527a0; }

    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 24px; }
    .pagination button { padding: 6px 14px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-size: 13px; }
    .pagination button.active { background: #a50034; color: #fff; border-color: #a50034; }
    .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }

    .empty-state { text-align: center; padding: 60px 20px; color: #999; }
</style>
{% endblock %}

{% block content %}
<div class="audit-container">
    <div class="audit-header">
        <h2>Admin Audit Log</h2>
    </div>

    <div class="filters">
        <select id="filterAction">
            <option value="">All Actions</option>
            <option value="created">Created</option>
            <option value="updated">Updated</option>
            <option value="submitted">Submitted</option>
            <option value="unlocked">Unlocked</option>
            <option value="relocked">Relocked</option>
            <option value="deleted">Deleted</option>
            <option value="revision_created">Revision Created</option>
        </select>
        <input type="date" id="filterDateFrom" title="From date">
        <input type="date" id="filterDateTo" title="To date">
        <button class="btn-filter" onclick="loadAuditLog(1)">Search</button>
        <button class="btn-reset" onclick="resetFilters()">Reset</button>
    </div>

    <table class="audit-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Action</th>
                <th>Project</th>
                <th>Rev</th>
                <th>Actor</th>
                <th>Detail</th>
                <th>Time</th>
            </tr>
        </thead>
        <tbody id="auditBody">
            <tr><td colspan="7" class="empty-state">Loading...</td></tr>
        </tbody>
    </table>

    <div class="pagination" id="pagination"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
var currentPage = 1;

document.addEventListener('DOMContentLoaded', function() {
    loadAuditLog(1);
});

function loadAuditLog(page) {
    currentPage = page;
    var params = new URLSearchParams();
    params.set('page', page);
    params.set('per_page', '30');

    fetch('/api/shared/audit-log?' + params.toString())
        .then(function(r) { return r.json(); })
        .then(function(data) {
            renderAuditLog(data);
            renderPagination(data);
        })
        .catch(function(err) {
            document.getElementById('auditBody').innerHTML =
                '<tr><td colspan="7" class="empty-state">Error loading audit log. Admin access required.</td></tr>';
        });
}

function renderAuditLog(data) {
    var tbody = document.getElementById('auditBody');
    if (!data.logs || data.logs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state">No audit entries found.</div></td></tr>';
        return;
    }

    var filterAction = document.getElementById('filterAction').value;
    var filterFrom = document.getElementById('filterDateFrom').value;
    var filterTo = document.getElementById('filterDateTo').value;

    var html = '';
    data.logs.forEach(function(log) {
        if (filterAction && log.action !== filterAction) return;
        if (filterFrom && log.created_at < filterFrom) return;
        if (filterTo && log.created_at > filterTo + 'T23:59:59') return;

        var actionClass = 'action-' + log.action;
        var date = log.created_at ? log.created_at.substring(0, 19).replace('T', ' ') : '-';
        html += '<tr>' +
            '<td>' + log.id + '</td>' +
            '<td><span class="action-badge ' + actionClass + '">' + log.action.toUpperCase() + '</span></td>' +
            '<td>' + escapeHtml(log.project_name || '-') + ' </td>' +
            '<td>' + (log.revision ? 'R' + log.revision : '-') + '</td>' +
            '<td>' + escapeHtml(log.actor_name || '-') + '</td>' +
            '<td>' + escapeHtml(log.detail || '-') + '</td>' +
            '<td style="font-size:12px;color:#999;">' + date + '</td>' +
            '</tr>';
    });
    tbody.innerHTML = html || '<tr><td colspan="7"><div class="empty-state">No matching entries.</div></td></tr>';
}

function renderPagination(data) {
    var div = document.getElementById('pagination');
    if (data.pages <= 1) { div.innerHTML = ''; return; }
    var html = '';
    html += '<button ' + (data.page <= 1 ? 'disabled' : '') + ' onclick="loadAuditLog(' + (data.page - 1) + ')">&laquo; Prev</button>';
    for (var i = 1; i <= Math.min(data.pages, 10); i++) {
        html += '<button class="' + (i === data.page ? 'active' : '') + '" onclick="loadAuditLog(' + i + ')">' + i + '</button>';
    }
    html += '<button ' + (data.page >= data.pages ? 'disabled' : '') + ' onclick="loadAuditLog(' + (data.page + 1) + ')">Next &raquo;</button>';
    div.innerHTML = html;
}

function resetFilters() {
    document.getElementById('filterAction').value = '';
    document.getElementById('filterDateFrom').value = '';
    document.getElementById('filterDateTo').value = '';
    loadAuditLog(1);
}

function escapeHtml(str) {
    if (!str) return '';
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
}
</script>
{% endblock %}
